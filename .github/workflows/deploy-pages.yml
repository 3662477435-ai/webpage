name: Deploy static dashboard to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build static site
        run: npm run build
      - name: Publish gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages --depth=1 || true
          git worktree add gh-pages-worktree gh-pages || git worktree add --detach gh-pages-worktree
          rsync -a --delete --exclude ".git" dist/ gh-pages-worktree/
          cd gh-pages-worktree
          touch .nojekyll
          git add -A
          git commit -m "Deploy static site" || exit 0
          git push origin HEAD:gh-pages --force
